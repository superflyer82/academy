version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: maengelmelder_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maengelmelder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-maengelmelder_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-maengelmelder}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
