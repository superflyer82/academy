name: CI

on:
  push:
    branches: [main, '001-*', 'feature/*']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: maengelmelder
          POSTGRES_PASSWORD: password
          POSTGRES_DB: maengelmelder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://maengelmelder:password@localhost:5432/maengelmelder_test

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://maengelmelder:password@localhost:5432/maengelmelder_test

      - name: Lint
        run: npm run lint

      - name: Build shared-types
        run: npm run build
        working-directory: packages/shared-types

      - name: Test backend
        run: npm test
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://maengelmelder:password@localhost:5432/maengelmelder_test
          JWT_ACCESS_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test

      - name: Test frontend
        run: npm test
        working-directory: apps/frontend
